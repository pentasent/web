<!DOCTYPE html>
<html>
  <body style="margin:0;padding:0;background:#f4f6f8;font-family:Arial,Helvetica,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
      <tr>
        <td align="center">

          <!-- Container -->
          <table width="520" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:14px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.08);">

            <!-- Header -->
            <tr>
              <td align="center" style="background:#3d253b;padding:28px;">
                <span style="font-size:22px;font-weight:700;color:#ffffff;letter-spacing:0.5px;">
                  Pentasent
                </span>
              </td>
            </tr>

            <!-- Content -->
            <tr>
              <td align="center" style="padding:40px 40px 10px 40px;">

                <h2 style="margin:0;color:#0f172a;font-size:22px;">
                  Verify your email
                </h2>

                <p style="margin:12px 0 30px 0;color:#475569;font-size:14px;line-height:1.6;">
                  Use the verification code below to complete your signup and activate your Pentasent account.
                </p>

                <!-- OTP -->
                <div style="
                  font-size:34px;
                  font-weight:700;
                  letter-spacing:10px;
                  background:#f1f5f9;
                  color:#3e2f4e;
                  padding:18px 28px;
                  border-radius:10px;
                  display:inline-block;
                  border:1px solid #e2e8f0;
                ">
                  {{ .Token }}
                </div>

                <p style="margin-top:25px;color:#64748b;font-size:13px;">
                  This code will expire in a few minutes.
                </p>

              </td>
            </tr>

            <!-- Divider -->
            <tr>
              <td style="padding:20px 40px;">
                <hr style="border:none;border-top:1px solid #e2e8f0;">
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td align="center" style="padding:0 40px 35px 40px;">

                <p style="font-size:12px;color:#94a3b8;margin:0;">
                  If you didn’t request this email, you can safely ignore it.
                </p>

                <p style="font-size:12px;color:#94a3b8;margin-top:10px;">
                  © Pentasent Inc. All rights reserved.
                </p>

              </td>
            </tr>

          </table>

        </td>
      </tr>
    </table>
  </body>
</html>
